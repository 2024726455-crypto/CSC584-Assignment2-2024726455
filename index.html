
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 50px; margin-bottom: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 form-container">
                <h2 class="text-center text-primary mb-4"><i class="fa-solid fa-user-plus"></i> Create Profile</h2>
                
                <form action="ProfileServlet" method="POST">
                    
                    <div class="mb-3">
                        <label for="name" class="form-label"><i class="fa-solid fa-user"></i> Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="MUHAMMAD AIMAN IQMAL BIN NORAZUAN" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="studentId" class="form-label"><i class="fa-solid fa-id-badge"></i> Student ID</label>
                            <input type="text" class="form-control" id="studentId" name="studentID" value="2024726455" required>
                        </div>
                        <div class="col-md-6">
                            <label for="program" class="form-label"><i class="fa-solid fa-graduation-cap"></i> Program</label>
                            <input type="text" class="form-control" id="program" name="programme" value="CDCS240" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label"><i class="fa-solid fa-envelope"></i> Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" value="emanq42@gmail.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="hobbies" class="form-label"><i class="fa-solid fa-gamepad"></i> Hobbies</label>
                        <input type="text" class="form-control" id="hobbies" name="hobbies" value="Collecting certain Hotwheels cars" required>
                    </div>

                    <div class="mb-3">
                        <label for="intro" class="form-label"><i class="fa-solid fa-comment"></i> Short Self-Introduction</label>
                        <textarea class="form-control" id="intro" name="introduction" rows="3" required>Hello! My name is Muhammad Aiman Iqmal Bin Norazuan. I currently live in Kajang, and I am studying for my Bachelor in Information Technology at UiTM Shah Alam.</textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary w-100" onclick="changeButtonState()">
                        <i class="fa-solid fa-paper-plane"></i> Submit Profile
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function changeButtonState() {
            const form = document.querySelector('form');
            if (form.checkValidity()) {
                const btn = document.getElementById('submitBtn');
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-success');
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Submitting...';
            }
        }
    </script>
</body>
</html>
